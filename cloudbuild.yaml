# ─────────────────────────────────────────────────────────────────────────────
# Cloud Build CI/CD pipeline – AI PDF Bot
#
# Configure these substitutions in your Cloud Build trigger (or pass via CLI):
#
#   _REGION           GCP region, e.g. us-central1
#   _REPOSITORY       Artifact Registry repo name, e.g. ai-pdf-bot
#   _BACKEND_SERVICE  Cloud Run service name for the backend
#   _FRONTEND_SERVICE Cloud Run service name for the frontend
#   _BACKEND_URL      Deployed backend Cloud Run HTTPS URL
#   _FRONTEND_URL     Deployed frontend Cloud Run HTTPS URL
#   _SQL_INSTANCE     Cloud SQL instance name (short name, NOT connection name)
#   _DATA_BUCKET      GCS bucket name for uploads + FAISS indexes
#   _SA_EMAIL         Service-account email used by Cloud Run services
#
# First-time deploy: run deploy/setup.sh, then trigger this pipeline.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-south1
  _REPOSITORY: ai-pdf-bot
  _BACKEND_SERVICE: ai-pdf-bot-backend
  _FRONTEND_SERVICE: ai-pdf-bot-frontend
  _BACKEND_URL: https://ai-pdf-bot-backend-812146165169.asia-south1.run.app
  _FRONTEND_URL: https://ai-pdf-bot-frontend-812146165169.asia-south1.run.app
  _SQL_INSTANCE: ai-pdf-bot-db
  _SQL_REGION: us-central1
  _DATA_BUCKET: project-527f9103-169a-4344-ba7-ai-pdf-bot-data
  _SA_EMAIL: ai-pdf-bot-sa@project-527f9103-169a-4344-ba7.iam.gserviceaccount.com
  # Image tag: auto-set to git short SHA by GitHub trigger.
  # When running manually via gcloud builds submit, defaults to "latest".
  _IMAGE_TAG: latest

steps:
  # ── 1. Build backend Docker image ─────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:${_IMAGE_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:latest
      - ./backend

  # ── 2. Push backend image ──────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend

  # ── 3. Build frontend Docker image ────────────────────────────────────────
  # NEXT_PUBLIC_API_BASE_URL is baked into the JS bundle at build time
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/frontend:${_IMAGE_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/frontend:latest
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=$_BACKEND_URL
      - ./frontend

  # ── 4. Push frontend image ─────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/frontend

  # ── 5. Deploy backend to Cloud Run ────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_BACKEND_SERVICE
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:${_IMAGE_TAG}
      - --region=$_REGION
      - --platform=managed
      - --execution-environment=gen2
      - --service-account=$_SA_EMAIL
      - --add-cloudsql-instances=$PROJECT_ID:$_SQL_REGION:$_SQL_INSTANCE
      - --add-volume=name=data,type=cloud-storage,bucket=$_DATA_BUCKET
      - --add-volume-mount=volume=data,mount-path=/app/data
      - --set-env-vars=ENVIRONMENT=gcp,CLOUD_SQL_CONNECTION_NAME=$PROJECT_ID:$_SQL_REGION:$_SQL_INSTANCE,DB_NAME=ai_pdf_bot,RESEND_FROM_EMAIL=aidocchat@hireplz.live,FRONTEND_URL=$_FRONTEND_URL,ALLOWED_ORIGINS=$_FRONTEND_URL
      - --set-secrets=DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest,SECRET_KEY=JWT_SECRET_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest
      - --allow-unauthenticated
      - --memory=2Gi
      - --cpu=2
      - --min-instances=1
      - --max-instances=10
      - --timeout=300

  # ── 6. Deploy frontend to Cloud Run ───────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend, deploy-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_FRONTEND_SERVICE
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/frontend:${_IMAGE_TAG}
      - --region=$_REGION
      - --platform=managed
      - --service-account=$_SA_EMAIL
      - --set-env-vars=NODE_ENV=production
      - --port=3000
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=60

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/frontend:${_IMAGE_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
